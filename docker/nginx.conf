user www-data;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    # Gzip compression — big transfer-size win for text assets (CSS/JS were served
    # uncompressed before). Skip already-compressed formats (images, woff2).
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        application/manifest+json
        application/vnd.ms-fontobject
        font/ttf
        font/otf
        image/svg+xml;

    server {
        listen 80;
        server_name _;
        root /var/www/html/public;
        index index.php;

        # Handle Laravel routes
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        # Pass PHP to php-fpm
        location ~ \.php$ {
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include fastcgi_params;
            fastcgi_read_timeout 300;
        }

        # Deny access to .env and hidden files
        location ~ /\. {
            deny all;
        }

        # Content-hashed Vite build assets — safe to cache forever (immutable).
        location ^~ /build/ {
            try_files $uri =404;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Cache static assets — fall through to PHP if file doesn't exist
        # (Filament/Livewire JS and CSS are served by Laravel routes, not static files).
        # NOTE: webp/avif added — they were missing, so converted images got no long cache.
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|webp|avif|woff|woff2|ttf|eot)$ {
            try_files $uri /index.php?$query_string;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }
}
